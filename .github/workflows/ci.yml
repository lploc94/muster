# CI runs automatically on push and pull requests targeting `main`,
# and can also be triggered manually from GitHub Actions → CI → Run workflow.
#
# It runs the shared local verifier (`npm test`), the M002 quality-gate
# checks, Svelte check, Settings docs + live-evidence ledger verifiers, and
# the full Playwright webview suite on Node 24 LTS.
# A valid ENVIRONMENT BLOCKED Settings ledger records blocked host attempts;
# local CI still only covers docs, ledger shape, and browser webview gates.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run test:source-boundary
      - run: npm run test:evidence
      - run: npm run test:source-boundary:fixtures
      - run: npm run test:settings-docs
      - run: npm run test:settings-live-evidence
      - run: npm run compile
      - run: npm run check:svelte
      - run: npx playwright install --with-deps chromium
      - run: npm run test:webview

  sqlite-extension-host:
    name: SQLite Extension Host (${{ matrix.vscode-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - vscode-version: "1.100.0"
            expect-incompatible: "1"
          - vscode-version: "1.101.0"
            expect-incompatible: "0"
          - vscode-version: "stable"
            expect-incompatible: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - run: npm ci
      - run: xvfb-run -a npm run test:sqlite-extension-host
        env:
          MUSTER_VSCODE_VERSION: ${{ matrix.vscode-version }}
          MUSTER_EXPECT_INCOMPATIBLE: ${{ matrix.expect-incompatible }}
