# CI runs automatically on push and pull requests targeting `main`,
# and can also be triggered manually from GitHub Actions → CI → Run workflow.
#
# Behavioral job (`compile`): shared local verifier (`npm test`), M002 quality-gate
# checks, Svelte check, Settings docs + live-evidence ledger verifiers, and the
# full Playwright webview suite on Node 24 LTS.
#
# Visual job (`visual`): pinned Linux Chromium compare via
# `npm run test:visual:linux` (Docker Playwright image). Never updates snapshots.
# On failure, uploads expected/actual/diff/trace/report evidence under the stable
# artifact name `visual-regression-failure` with bounded retention.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run test:source-boundary
      - run: npm run test:evidence
      - run: npm run test:source-boundary:fixtures
      - run: npm run test:settings-docs
      - run: npm run test:settings-live-evidence
      - run: npm run compile
      - run: npm run check:svelte
      - run: npx playwright install --with-deps chromium
      - run: npm run test:webview

  # Distinct required check: pinned Linux visual compare (no snapshot updates).
  visual:
    name: Visual regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - run: npm ci

      # Compare only — never auto-update snapshots; authoring stays local/explicit.
      # scripts/run-visual-baselines.mjs runs inside lockfile-pinned
      # mcr.microsoft.com/playwright:v*-jammy (Docker available on ubuntu-latest).
      - name: Export host uid/gid for visual artifact ownership
        run: |
          echo "MUSTER_VISUAL_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "MUSTER_VISUAL_GID=$(id -g)" >> "$GITHUB_ENV"
          mkdir -p test-results playwright-report
      - name: Compare visual baselines (pinned Linux Chromium)
        run: npm run test:visual:linux

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-regression-failure
          path: |
            test-results/
            playwright-report/
          retention-days: 14
          if-no-files-found: warn
